<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Document</title>
</head>

<body class="bg-secundary">

    <div class="d-flex justify-content-center bg-success">
        <!-- <h1 class="display-1">Trabalhando com Utilities e Helpers</h1> -->
        <div class="square m-5 border"></div>
        <div class="square my-5 border border-3 border-dark"></div>
        <div class="square mx-5 border border-5 border-primary"></div>
        <div class="square ms-5"></div>
        <div class="square me-5"></div>
        <div class="square mt-5"></div>
        <div class="square mb-5"></div>
    </div>


    <div class="d-flex justify-content-center my-5">
        <!-- <h1 class="display-1">Trabalhando com paddings</h1> -->
        <div class="square p-5 mx-2 py-5 border border-5 border-warning bg-success"></div>
        <div class="square mx-2 py-5 border border-5 border-primary bg-primary"></div>
        <div class="square mx-2 px-5 border border-5 border-danger bg-dark"></div>
        <div class="square mx-2 ps-5 border border-5 border-info bg-success"></div>
        <div class="square mx-2 pe-5 border border-5 border-warning bg-danger"></div>
        <div class="square mx-2 pt-5 border border-5 border-success bg-warning"></div>
        <div class="square mx-2 pb-5 border border-5 border-danger bg-secundary"></div>
    </div>

    <div class="d-flex justify-content-center my-5">
        <a class="link-success mx-3">Link</a>
        <a href="" class="link-dark mx-3">Link </a>
        <a href="" class="link-primary mx-3">Link </a>
        <a href="" class="link-secundary mx-3">Link </a>
        <a href="" class="link-danger mx-3">Link </a>
        <a href="" class="link-warning mx-3">Link </a>

    </div>

    <div class="d-flex justify-content-center my-5">
        <div class="ratio ratio-1x1 w-50">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/mumNhSAKls4"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>

        </div>

    </div>

    <div class="d-flex justify-content-center my-5">
        <div class="ratio ratio-4x3 w-50">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/mumNhSAKls4"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>

        </div>

    </div>

    <div class="d-flex justify-content-center my-5">
        <div class="ratio ratio-16x9 w-50">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/mumNhSAKls4"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>

        </div>

    </div>

    <div class="d-flex justify-content-center my-5">
        <div class="ratio ratio-21x9 w-75">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/mumNhSAKls4"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>

        </div>

    </div>


    <div class="m-bottom"></div>
</body>

</html>
